<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Video Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .status { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    .status.active { color: #22c55e; }
    .status.error { color: #ef4444; }
    .scenes { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
    .scene { width: 120px; height: 213px; border-radius: 8px; overflow: hidden; background: #1a1a1a; position: relative; }
    .scene img { width: 100%; height: 100%; object-fit: cover; }
    .scene .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.7rem; }
    .scene .check { position: absolute; bottom: 4px; right: 4px; background: #22c55e; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    #videoContainer { width: 270px; height: 480px; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 1rem; display: none; }
    #videoContainer video { width: 100%; height: 100%; object-fit: contain; }
    #videoContainer canvas { width: 100%; height: 100%; }
    .progress-bar { width: 270px; height: 4px; background: #333; border-radius: 2px; margin-bottom: 1rem; display: none; }
    .progress-bar .fill { height: 100%; background: #22c55e; border-radius: 2px; transition: width 0.3s; }
    button { background: #22c55e; color: #000; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #16a34a; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .download { display: none; margin-top: 1rem; background: #3b82f6; }
    .download:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>🎬 AI Video Generator</h1>
  <p class="status" id="status">Ready to generate</p>

  <div class="scenes" id="scenes"></div>
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <div id="videoContainer"><video id="video" controls></video></div>

  <button id="generateBtn" onclick="generate()">Generate Video</button>
  <button id="downloadBtn" class="download" onclick="download()">Download WebM</button>

  <canvas id="canvas" width="576" height="1024" style="display:none"></canvas>

  <script>
    const PROMPT = "5 shocking reasons you are not losing belly fat, fitness motivation";
    const SCENES = [
      "A fit person doing intense workout in dramatic gym lighting, cinematic fitness motivation, dark moody atmosphere",
      "Close up of determined face during exercise, sweat dripping, dramatic rim lighting, motivational fitness",
      "Person running on treadmill at sunrise, golden hour lighting, cinematic slow motion feel, fitness journey",
      "Healthy food and fitness equipment flat lay, professional photography, vibrant colors, wellness lifestyle",
      "Person celebrating fitness achievement, triumphant pose, epic lighting, motivational success"
    ];
    const WIDTH = 576;
    const HEIGHT = 1024;
    const FPS = 30;
    const FRAME_DURATION = 3000; // 3 seconds per scene

    let images = [];
    let videoBlob = null;

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (cls ? ' ' + cls : '');
    }

    function setProgress(pct) {
      document.getElementById('progressBar').style.display = 'block';
      document.getElementById('progressFill').style.width = pct + '%';
    }

    async function preloadImages() {
      const container = document.getElementById('scenes');
      container.innerHTML = '';

      for (let i = 0; i < SCENES.length; i++) {
        const div = document.createElement('div');
        div.className = 'scene';
        div.innerHTML = `<div class="loading">Loading...</div>`;
        container.appendChild(div);

        const img = new Image();
        img.crossOrigin = 'anonymous';

        await new Promise((resolve) => {
          img.onload = () => {
            images[i] = img;
            div.innerHTML = `<img src="${img.src}"><div class="check">✓</div>`;
            resolve();
          };
          img.onerror = () => {
            div.innerHTML = `<div class="loading" style="color:#ef4444">Failed</div>`;
            resolve();
          };
          img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(SCENES[i])}?width=${WIDTH}&height=${HEIGHT}&nologo=true&seed=${i}`;
        });

        setProgress((i + 1) / SCENES.length * 50);
      }
    }

    async function renderVideo() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const stream = canvas.captureStream(FPS);
      const recorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp9',
        videoBitsPerSecond: 5_000_000,
      });

      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };

      const done = new Promise((resolve) => {
        recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/webm' }));
      });

      recorder.start();

      const totalFrames = SCENES.length * Math.floor(FRAME_DURATION / (1000 / FPS));
      let frameCount = 0;

      for (let i = 0; i < images.length; i++) {
        const img = images[i];
        if (!img) continue;

        const framesPerScene = Math.floor(FRAME_DURATION / (1000 / FPS));
        const transitionFrames = Math.floor(0.5 * FPS);

        // Static frames
        for (let f = 0; f < framesPerScene - transitionFrames; f++) {
          drawImageFit(ctx, img, WIDTH, HEIGHT);
          frameCount++;
          setProgress(50 + (frameCount / totalFrames) * 50);
          await sleep(1000 / FPS);
        }

        // Transition to next
        if (i < images.length - 1 && images[i + 1]) {
          for (let f = 0; f < transitionFrames; f++) {
            const progress = f / transitionFrames;
            ctx.globalAlpha = 1 - progress;
            drawImageFit(ctx, img, WIDTH, HEIGHT);
            ctx.globalAlpha = progress;
            drawImageFit(ctx, images[i + 1], WIDTH, HEIGHT);
            ctx.globalAlpha = 1;
            frameCount++;
            setProgress(50 + (frameCount / totalFrames) * 50);
            await sleep(1000 / FPS);
          }
        }
      }

      recorder.stop();
      return done;
    }

    function drawImageFit(ctx, img, w, h) {
      const scale = Math.max(w / img.width, h / img.height);
      const x = (w - img.width * scale) / 2;
      const y = (h - img.height * scale) / 2;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function generate() {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        setStatus('Loading AI images...', 'active');
        await preloadImages();

        setStatus('Creating video from images...', 'active');
        videoBlob = await renderVideo();

        const url = URL.createObjectURL(videoBlob);
        const video = document.getElementById('video');
        video.src = url;
        document.getElementById('videoContainer').style.display = 'block';
        document.getElementById('downloadBtn').style.display = 'inline-block';

        setStatus('Video generated!', 'active');
      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = 'Generate Again';
    }

    function download() {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(videoBlob);
      a.download = 'ai-video.webm';
      a.click();
    }
  </script>
</body>
</html>
